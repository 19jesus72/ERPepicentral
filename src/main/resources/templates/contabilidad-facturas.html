<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Facturación</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>

    <main class="content">
        <header class="top-bar">
            <h1>Facturación y Cuentas por Cobrar</h1>
            <div class="user-info"><span>Módulo: <strong>Contabilidad y Finanzas</strong></span></div>
        </header>

        <div class="dashboard-grid">

            <div class="widget" style="grid-column: span 1; height: fit-content; border-top: 5px solid var(--primary);">
                <h3 style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-file-invoice"></i> Emitir Factura
                </h3>

                <form th:action="@{/contabilidad/facturas/generar}" method="post">

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Cliente</label>
                        <select name="clientId" class="input-field" required>
                            <option value="" disabled selected>-- Seleccione Cliente --</option>
                            <option th:each="cli : ${clientes}" th:value="${cli.id}" th:text="${cli.businessName}"></option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Secuencial Factura</label>
                        <input type="text" name="invoiceNumber" class="input-field" placeholder="Ej: 001-001-00045" required>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Concepto / Servicio</label>
                        <textarea name="projectDescription" class="input-field" rows="2" placeholder="Ej: Mantenimiento anual de sistema GLP..." required></textarea>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Emisión</label>
                            <input type="date" name="issueDate" class="input-field" th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Vencimiento</label>
                            <input type="date" name="dueDate" class="input-field" required>
                        </div>
                    </div>

                    <div style="background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #1e3a8a; display: block; margin-bottom: 5px;">Subtotal Neto (USD)</label>
                        <input type="number" step="0.01" name="subtotal" class="input-field" required>

                        <label style="font-size: 0.8rem; font-weight: bold; color: #1e3a8a; display: block; margin-bottom: 5px; margin-top: 10px;">% Porcentaje IVA</label>
                        <select name="ivaPercentage" class="input-field" style="margin-bottom: 0;">
                            <option value="15">15%</option>
                            <option value="12">12%</option>
                            <option value="0">0%</option>
                        </select>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; background: var(--secondary);">
                        <i class="fas fa-paper-plane"></i> GENERAR FACTURA
                    </button>
                </form>
            </div>

            <div class="widget" style="grid-column: span 2;">
                <h3 style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-hand-holding-usd"></i> Registro de Facturas (Cuentas por Cobrar)
                </h3>

                <table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem;">
                    <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; background: #f8fafc;">
                        <th style="padding: 10px;">FACTURA</th>
                        <th style="padding: 10px;">CLIENTE</th>
                        <th style="padding: 10px;">FECHAS</th>
                        <th style="padding: 10px;">TOTAL</th>
                        <th style="padding: 10px;">ESTADO</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="fac : ${facturas}" style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding: 10px; font-family: monospace; font-weight: bold; color: #1e3a8a;" th:text="${fac.invoiceNumber}"></td>
                        <td style="padding: 10px;">
                            <strong th:text="${fac.client.businessName}" style="display: block;"></strong>
                            <small th:text="${fac.projectDescription}" style="color: #64748b;"></small>
                        </td>
                        <td style="padding: 10px;">
                            <small style="display: block; color: #64748b;">Emi: <span th:text="${fac.issueDate}"></span></small>
                            <small style="display: block; color: #dc2626; font-weight: bold;">Ven: <span th:text="${fac.dueDate}"></span></small>
                        </td>
                        <td style="padding: 10px; font-weight: 900; font-size: 1.1rem; color: #16a34a;">
                            $<span th:text="${#numbers.formatDecimal(fac.total, 1, 2)}"></span>
                        </td>
                        <td style="padding: 10px;">
                            <div th:if="${fac.status == 'PENDIENTE'}">
                                <form th:action="@{/contabilidad/facturas/cobrar}" method="post">
                                    <input type="hidden" name="invoiceId" th:value="${fac.id}">
                                    <button type="submit" class="btn" style="padding: 4px 10px; background: #dc2626; font-size: 0.75rem; width: 100%;">
                                        <i class="fas fa-clock"></i> PENDIENTE (COBRAR)
                                    </button>
                                </form>
                            </div>
                            <span th:if="${fac.status == 'PAGADA'}" style="background: #dcfce7; color: #166534; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: block; text-align: center;">
                                        <i class="fas fa-check-double"></i> PAGADA
                                    </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(facturas)}">
                        <td colspan="5" style="padding: 20px; text-align: center; color: #94a3b8;">No se han emitido facturas.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>
</body>
</html>

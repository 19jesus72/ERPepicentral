<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Epicentral | Control de Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: nav.sidebar}"></nav>

    <main class="content">
        <header class="top-bar">
            <h1>Permisos de Acceso: <span th:text="${user.firstName + ' ' + user.firstSurname}"></span></h1>
        </header>

        <div class="dashboard-grid">
            <div class="widget" style="grid-column: span 2;">
                <p style="color: #64748b; margin-bottom: 25px;">Seleccione los módulos a los que este colaborador tendrá acceso visual en su panel.</p>

                <form th:action="@{/usuarios/permisos/guardar}" method="post">
                    <input type="hidden" name="userId" th:value="${user.id}">

                    <div style="display: grid; gap: 15px;">
                        <div th:each="modulo : ${todosLosModulos}"
                             style="display: flex; align-items: center; padding: 15px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">

                            <input type="checkbox" name="modulos" th:value="${modulo}"
                                   th:checked="${user.functionalities.contains(modulo)}"
                                   style="width: 20px; height: 20px; margin-right: 15px; cursor: pointer;">

                            <div>
                                <strong th:text="${modulo}" style="color: #1e3a8a; display: block;"></strong>
                                <small style="color: #64748b;">Habilitar acceso a la pantalla de <span th:text="${modulo.toLowerCase()}"></span></small>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 30px;">
                        <button type="submit" class="btn" style="width: auto; padding: 12px 40px;">
                            <i class="fas fa-shield-alt"></i> ACTUALIZAR PRIVILEGIOS
                        </button>
                        <a href="/usuarios/actualizar" style="margin-left: 15px; color: #64748b; text-decoration: none;">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>

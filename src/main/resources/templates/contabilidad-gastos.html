<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Cuentas por Pagar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>

    <main class="content">
        <header class="top-bar">
            <h1>Control de Gastos y Cuentas por Pagar</h1>
            <div class="user-info"><span>Módulo: <strong>Contabilidad y Finanzas</strong></span></div>
        </header>

        <div class="dashboard-grid">

            <div class="widget" style="grid-column: span 1; height: fit-content; border-top: 5px solid #f59e0b;">
                <h3 style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-shopping-cart"></i> Registrar Compra / Gasto
                </h3>

                <form th:action="@{/contabilidad/gastos/registrar}" method="post">

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Proveedor</label>
                        <select name="supplierId" class="input-field" required>
                            <option value="" disabled selected>-- Seleccione Proveedor --</option>
                            <option th:each="prov : ${proveedores}" th:value="${prov.id}" th:text="${prov.businessName}"></option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Factura de Proveedor</label>
                        <input type="text" name="invoiceNumber" class="input-field" placeholder="Ej: 002-005-9988" required>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Descripción de la Compra</label>
                        <textarea name="description" class="input-field" rows="2" placeholder="Ej: Compra de reguladores de presión..." required></textarea>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Fecha Emisión</label>
                            <input type="date" name="issueDate" class="input-field" th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Pago Máximo</label>
                            <input type="date" name="dueDate" class="input-field" required>
                        </div>
                    </div>

                    <div style="background: #fffbeb; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #fde68a;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #b45309; display: block; margin-bottom: 5px;">Total Factura (USD con IVA)</label>
                        <input type="number" step="0.01" name="totalAmount" class="input-field" required style="margin-bottom: 0;">
                    </div>

                    <button type="submit" class="btn" style="width: 100%; background: #f59e0b; color: black;">
                        <i class="fas fa-save"></i> REGISTRAR EGRESO
                    </button>
                </form>
            </div>

            <div class="widget" style="grid-column: span 2;">
                <h3 style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-file-invoice-dollar"></i> Cuentas por Pagar Activas
                </h3>

                <table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem;">
                    <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; background: #f8fafc;">
                        <th style="padding: 10px;">PROVEEDOR / DETALLE</th>
                        <th style="padding: 10px;">FACTURA N°</th>
                        <th style="padding: 10px;">FECHAS</th>
                        <th style="padding: 10px;">MONTO</th>
                        <th style="padding: 10px;">ACCIÓN</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="gasto : ${gastos}" style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding: 10px;">
                            <strong th:text="${gasto.supplier.businessName}" style="display: block; color: #1e3a8a;"></strong>
                            <small th:text="${gasto.description}" style="color: #64748b;"></small>
                        </td>
                        <td style="padding: 10px; font-family: monospace; font-weight: bold;" th:text="${gasto.invoiceNumber}"></td>
                        <td style="padding: 10px;">
                            <small style="display: block; color: #64748b;">Ingreso: <span th:text="${gasto.issueDate}"></span></small>
                            <small style="display: block; color: #f59e0b; font-weight: bold;">Límite: <span th:text="${gasto.dueDate}"></span></small>
                        </td>
                        <td style="padding: 10px; font-weight: 900; font-size: 1.1rem; color: #dc2626;">
                            $<span th:text="${#numbers.formatDecimal(gasto.totalAmount, 1, 2)}"></span>
                        </td>
                        <td style="padding: 10px;">
                            <div th:if="${gasto.status == 'PENDIENTE'}">
                                <form th:action="@{/contabilidad/gastos/pagar}" method="post">
                                    <input type="hidden" name="expenseId" th:value="${gasto.id}">
                                    <button type="submit" class="btn" style="padding: 4px 10px; background: #f59e0b; color: black; font-size: 0.75rem; width: 100%;">
                                        <i class="fas fa-money-bill-wave"></i> PAGAR
                                    </button>
                                </form>
                            </div>
                            <span th:if="${gasto.status == 'PAGADO'}" style="background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: block; text-align: center;">
                                        <i class="fas fa-check"></i> CANCELADO
                                    </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(gastos)}">
                        <td colspan="5" style="padding: 20px; text-align: center; color: #94a3b8;">No se han registrado compras ni gastos.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>
</body>
</html>

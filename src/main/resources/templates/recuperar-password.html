<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Recuperar Contraseña</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%; max-width: 400px; text-align: center;
        }
        .alert-success {
            background: #dcfce7; color: #166534; padding: 15px; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 20px; border-left: 4px solid #16a34a; text-align: left;
        }
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .login-input {
            width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #e2e8f0;
            border-radius: 8px; font-size: 1rem; box-sizing: border-box;
        }
        .btn-login {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div style="font-size: 2.5rem; color: var(--secondary); margin-bottom: 10px;">
        <i class="fas fa-key"></i>
    </div>
    <h2 style="color: var(--primary); margin: 0 0 5px 0;">Recuperar Acceso</h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">Ingrese su correo institucional. Si existe en nuestra base de datos, le enviaremos las instrucciones.</p>

    <div th:if="${exito}" class="alert-success">
        <i class="fas fa-envelope-circle-check"></i> <span th:text="${exito}"></span>
    </div>

    <form th:action="@{/recuperar-password/enviar}" method="post" th:if="${exito == null}">
        <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" class="login-input" placeholder="usuario@epicentral.com" required autofocus>
        </div>
        <button type="submit" class="btn-login">ENVIAR ENLACE</button>
    </form>

    <div style="margin-top: 25px; font-size: 0.85rem;">
        <a th:href="@{/login}" style="color: #64748b; text-decoration: none; font-weight: bold;"><i class="fas fa-arrow-left"></i> Volver al Login</a>
    </div>
</div>

</body>
</html>

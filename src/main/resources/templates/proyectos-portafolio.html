<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Portafolio de Proyectos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>
    <main class="content">
        <header class="top-bar">
            <h1>Portafolio de Obras y Proyectos</h1>
            <div class="user-info"><span>Módulo: <strong>Ingeniería y Proyectos</strong></span></div>
        </header>

        <div class="dashboard-grid">
            <div class="widget" style="grid-column: span 1; border-top: 5px solid #3b82f6;">
                <h3 style="color: var(--primary); margin-top: 0;"><i class="fas fa-folder-plus"></i> Crear Proyecto</h3>
                <form th:action="@{/proyectos/guardar}" th:object="${nuevoProyecto}" method="post">
                    <input type="text" th:field="*{name}" class="input-field" placeholder="Nombre de la obra..." required style="margin-bottom: 10px;">

                    <select name="clientId" class="input-field" required style="margin-bottom: 10px;">
                        <option value="" disabled selected>-- Seleccione Cliente --</option>
                        <option th:each="cli : ${clientes}" th:value="${cli.id}" th:text="${cli.businessName}"></option>
                    </select>

                    <select name="managerId" class="input-field" required style="margin-bottom: 10px;">
                        <option value="" disabled selected>-- Asignar Jefe de Obra --</option>
                        <option th:each="user : ${usuarios}" th:value="${user.id}" th:text="${user.firstName + ' ' + user.firstSurname}"></option>
                    </select>

                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <input type="date" th:field="*{startDate}" class="input-field" required title="Inicio">
                        <input type="date" th:field="*{expectedEndDate}" class="input-field" required title="Fin Estimado">
                    </div>

                    <input type="number" step="0.01" th:field="*{totalBudget}" class="input-field" placeholder="Presupuesto Asignado ($)" required style="margin-bottom: 10px;">

                    <button type="submit" class="btn" style="width: 100%; background: #3b82f6;"><i class="fas fa-save"></i> INICIAR PROYECTO</button>
                </form>
            </div>

            <div class="widget" style="grid-column: span 2;">
                <h3 style="color: var(--primary); margin-top: 0;"><i class="fas fa-city"></i> Obras Activas</h3>
                <div th:each="p : ${proyectos}" style="background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h4 style="margin: 0; color: #1e3a8a; font-size: 1.1rem;" th:text="${p.name}"></h4>
                        <p style="margin: 5px 0; color: #64748b; font-size: 0.85rem;"><i class="fas fa-building"></i> <span th:text="${p.client.businessName}"></span> | <i class="fas fa-hard-hat"></i> <span th:text="${p.manager.firstName}"></span></p>
                        <span style="background: #e0f2fe; color: #0284c7; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold;" th:text="${p.status}"></span>
                    </div>
                    <a th:href="@{/proyectos/tablero/{id}(id=${p.id})}" class="btn" style="background: var(--secondary); text-decoration: none;"><i class="fas fa-columns"></i> TABLERO KANBAN</a>
                </div>
                <p th:if="${#lists.isEmpty(proyectos)}" style="text-align: center; color: #94a3b8;">No hay proyectos registrados.</p>
            </div>
        </div>
    </main>
</div>
</body>
</html>

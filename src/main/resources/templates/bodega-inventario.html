<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Catálogo y Stock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>

    <main class="content">
        <header class="top-bar">
            <h1>Catálogo de Materiales y Control de Stock</h1>
            <div class="user-info"><span>Módulo: <strong>Bodega e Inventario</strong></span></div>
        </header>

        <div th:if="${param.exito}" style="background: #dcfce7; color: #166534; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold;">
            <i class="fas fa-check-circle"></i> Material guardado correctamente en el catálogo.
        </div>

        <div class="dashboard-grid">

            <div class="widget" style="grid-column: span 1; height: fit-content; border-top: 5px solid #0f172a;">
                <h3 id="formTitle" style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-box-open"></i> Registrar Material
                </h3>

                <form th:action="@{/bodega/inventario/guardar}" th:object="${nuevoProducto}" method="post" id="productoForm">
                    <input type="hidden" id="id" name="id">

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Código / SKU</label>
                        <input type="text" id="code" name="code" class="input-field" placeholder="Ej: TIC-005" required>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Nombre del Artículo</label>
                        <input type="text" id="name" name="name" class="input-field" placeholder="Ej: Router Gigabit..." required>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Categoría</label>
                        <select id="category" name="category" class="input-field" required>
                            <option value="" disabled selected>-- Seleccione Categoría --</option>
                            <option value="TICs">TICs y Redes</option>
                            <option value="GLP">Infraestructura GLP</option>
                            <option value="Herramientas">Herramientas de Trabajo</option>
                            <option value="Seguridad Industrial">Seguridad Industrial / EPP</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Unidad</label>
                            <input type="text" id="unit" name="unit" class="input-field" placeholder="Metro, Unidad..." required>
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Stock Mínimo</label>
                            <input type="number" step="0.01" id="minimumStock" name="minimumStock" class="input-field" value="0" required>
                        </div>
                    </div>

                    <div style="background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #1e3a8a; display: block; margin-bottom: 5px;">Stock Inicial Físico</label>
                        <input type="number" step="0.01" id="currentStock" name="currentStock" class="input-field" value="0" style="margin-bottom: 0;" required>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn" style="flex: 1; background: var(--primary);">
                            <i class="fas fa-save"></i> GUARDAR
                        </button>
                        <button type="button" class="btn" style="background: #e2e8f0; color: #475569;" onclick="limpiarFormulario()">
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>
                </form>
            </div>
            <div style="margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <form th:action="@{/bodega/inventario}" method="get" style="display: flex; gap: 10px;">
                    <input type="text" name="keyword" th:value="${keyword}" class="input-field" placeholder="Buscar por nombre o código de material..." style="margin-bottom: 0; flex: 1;">
                    <button type="submit" class="btn" style="background: var(--primary);"><i class="fas fa-search"></i> BUSCAR</button>
                    <a href="/bodega/inventario" class="btn" style="background: #64748b; text-decoration: none;"><i class="fas fa-sync"></i> LIMPIAR</a>
                </form>
            </div>
            <div class="widget" style="grid-column: span 2;">
                <h3 style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-cubes"></i> Existencias en Bodega Principal
                </h3>

                <table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem;">
                    <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; background: #f8fafc;">
                        <th style="padding: 10px;">CÓDIGO</th>
                        <th style="padding: 10px;">MATERIAL</th>
                        <th style="padding: 10px;">CATEGORÍA</th>
                        <th style="padding: 10px; text-align: center;">STOCK FÍSICO</th>
                        <th style="padding: 10px; text-align: center;">ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${productos}" style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding: 10px; font-family: monospace; font-weight: bold; color: #475569;" th:text="${p.code}"></td>
                        <td style="padding: 10px;">
                            <strong style="color: #1e3a8a; display: block;" th:text="${p.name}"></strong>
                            <small style="color: #94a3b8;" th:text="${'Medida: ' + p.unit}"></small>
                        </td>
                        <td style="padding: 10px;">
                            <span style="background: #e2e8f0; color: #475569; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;" th:text="${p.category}"></span>
                        </td>
                        <td style="padding: 10px; text-align: center;">
                            <div th:if="${p.currentStock > p.minimumStock}" style="color: #16a34a; font-weight: bold; font-size: 1.1rem;">
                                <span th:text="${p.currentStock}"></span>
                            </div>
                            <div th:if="${p.currentStock <= p.minimumStock}" style="color: #dc2626; font-weight: bold; font-size: 1.1rem;" title="Requiere reabastecimiento">
                                <i class="fas fa-exclamation-circle"></i> <span th:text="${p.currentStock}"></span>
                            </div>
                        </td>
                        <td style="padding: 10px; display: flex; gap: 5px; justify-content: center;">
                            <button class="btn" style="padding: 5px 10px; background: #eab308; color: black; font-size: 0.75rem;"
                                    th:onclick="cargarParaEditar([[${p.id}]], [[${p.code}]], [[${p.name}]], [[${p.category}]], [[${p.unit}]], [[${p.currentStock}]], [[${p.minimumStock}]])">
                                <i class="fas fa-edit"></i>
                            </button>
                            <form th:action="@{/bodega/inventario/eliminar}" method="post" onsubmit="return confirm('¿Confirma la eliminación del catálogo?');">
                                <input type="hidden" name="productoId" th:value="${p.id}">
                                <button type="submit" class="btn" style="padding: 5px 10px; background: #dc2626; font-size: 0.75rem;">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    function cargarParaEditar(id, code, name, category, unit, currentStock, minimumStock) {
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-pen"></i> Editar Material';
        document.getElementById('id').value = id;
        document.getElementById('code').value = code;
        document.getElementById('name').value = name;
        document.getElementById('category').value = category;
        document.getElementById('unit').value = unit;
        document.getElementById('currentStock').value = currentStock;
        document.getElementById('minimumStock').value = minimumStock;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function limpiarFormulario() {
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-box-open"></i> Registrar Material';
        document.getElementById('id').value = '';
        document.getElementById('productoForm').reset();
    }
</script>
</body>
</html>

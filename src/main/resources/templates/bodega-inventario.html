<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Catálogo y Stock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 15px;
            gap: 20px;
        }
        .search-inline {
            display: flex;
            flex-grow: 1;
            gap: 5px;
        }
        .search-inline .input-field {
            margin-bottom: 0;
            flex-grow: 1;
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .btn-sm {
            padding: 6px 10px;
            font-size: 0.75rem;
            min-width: auto;
        }
        .stock-alert {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>

    <main class="content">
        <header class="top-bar">
            <h1>Gestión de Inventarios</h1>
            <div class="user-info"><span>Master Control Engineering</span></div>
        </header>

        <div class="dashboard-grid">
            <!-- PANEL IZQUIERDO: REGISTRO -->
            <div class="widget" style="grid-column: span 1; height: fit-content; border-top: 5px solid #0f172a;">
                <h3 id="formTitle" style="color: var(--primary); margin-top: 0;"><i class="fas fa-plus-circle"></i> Nuevo Material</h3>
                <form th:action="@{/bodega/inventario/guardar}" th:object="${nuevoProducto}" method="post" id="productoForm">
                    <input type="hidden" id="id" name="id">

                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 3px;">Código SKU</label>
                        <input type="text" id="code" name="code" class="input-field" placeholder="Ej: GLP-100" required>
                    </div>

                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 3px;">Descripción</label>
                        <input type="text" id="name" name="name" class="input-field" placeholder="Nombre del producto" required>
                    </div>

                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 3px;">Categoría</label>
                        <select id="category" name="category" class="input-field" required>
                            <option value="TICs">TICs y Redes</option>
                            <option value="GLP">Infraestructura GLP</option>
                            <option value="Herramientas">Herramientas</option>
                            <option value="Seguridad">Seguridad Industrial</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 3px;">Costo Unit. ($)</label>
                            <input type="number" step="0.01" id="unitCost" name="unitCost" class="input-field" required>
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 3px;">Mínimo</label>
                            <input type="number" step="0.01" id="minimumStock" name="minimumStock" class="input-field" required>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; background: var(--primary); margin-top: 5px;">
                        <i class="fas fa-save"></i> GUARDAR
                    </button>
                </form>
            </div>

            <!-- PANEL DERECHO: INVENTARIO Y EXISTENCIAS -->
            <div class="widget" style="grid-column: span 2;">
                <div class="header-flex">
                    <h3 style="color: var(--primary); margin: 0; white-space: nowrap;"><i class="fas fa-cubes"></i> Existencias</h3>

                    <!-- BARRA DE BÚSQUEDA AMPLIA E INTEGRADA -->
                    <form th:action="@{/bodega/inventario}" method="get" class="search-inline">
                        <input type="text" name="keyword" th:value="${keyword}" class="input-field" placeholder="Buscar por nombre o código...">
                        <button type="submit" class="btn btn-sm" title="Buscar"><i class="fas fa-search"></i></button>
                        <a th:href="@{/bodega/inventario}" class="btn btn-sm" style="background: #64748b; color: white;" title="Limpiar"><i class="fas fa-sync"></i></a>
                    </form>
                </div>

                <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
                    <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #f1f5f9; color: #64748b;">
                        <th style="padding: 10px;">CÓDIGO</th>
                        <th style="padding: 10px;">MATERIAL</th>
                        <th style="padding: 10px; text-align: center;">COSTO</th>
                        <th style="padding: 10px; text-align: center;">STOCK</th>
                        <th style="padding: 10px; text-align: center;">ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${productos}" style="border-bottom: 1px solid #f8fafc;">
                        <td style="padding: 10px; font-family: monospace; font-weight: bold;" th:text="${p.code}"></td>
                        <td style="padding: 10px;">
                            <strong th:text="${p.name}"></strong><br>
                            <small th:text="${p.category}" style="color: #94a3b8;"></small>
                        </td>
                        <td style="padding: 10px; text-align: center; color: #64748b;" th:text="${'$' + p.unitCost}"></td>
                        <td style="padding: 10px; text-align: center;">
                                    <span th:class="${p.currentStock <= p.minimumStock} ? 'stock-alert' : ''"
                                          th:text="${p.currentStock}"></span>
                        </td>
                        <td style="padding: 10px; text-align: center;">
                            <button class="btn btn-sm" style="background: #eab308; color: black;"
                                    th:onclick="cargarParaEditar([[${p.id}]], [[${p.code}]], [[${p.name}]], [[${p.category}]], [[${p.currentStock}]], [[${p.minimumStock}]], [[${p.unitCost}]])">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script>
    function cargarParaEditar(id, code, name, category, currentStock, minimumStock, unitCost) {
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-pen"></i> Editar Material';
        document.getElementById('id').value = id;
        document.getElementById('code').value = code;
        document.getElementById('name').value = name;
        document.getElementById('category').value = category;
        document.getElementById('unitCost').value = unitCost;
        document.getElementById('minimumStock').value = minimumStock;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>

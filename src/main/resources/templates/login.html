<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epicentral | Acceso al Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header {
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: var(--primary);
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .login-input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .alert-error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            text-align: left;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #1d4ed8;
        }

        .login-footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .login-footer a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .brand-logo {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="brand-logo">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h2>EPICENTRAL</h2>
        <p>Master Control Engineering ERP</p>
    </div>

    <div th:if="${param.error}" class="alert-error">
        <i class="fas fa-exclamation-circle"></i> Credenciales incorrectas. Por favor, verifique sus datos.
    </div>

    <div th:if="${param.logout}" style="color: #16a34a; font-size: 0.85rem; margin-bottom: 15px;">
        <i class="fas fa-check-circle"></i> Sesión cerrada exitosamente.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" name="username" class="login-input" placeholder="usuario@epicentral.com" required autofocus>
            </div>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="login-input" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn-login">
            INICIAR SESIÓN
        </button>
    </form>

    <div class="login-footer">
        <p>¿Problemas con su acceso?<br> Contacte con el <a href="#">Administrador TIC</a></p>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Acceso al Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="login-container">
<div class="card" style="max-width: 450px; border-top: 5px solid var(--secondary);">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fas fa-microchip" style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;"></i>
        <h2 style="margin: 0;">EPICENTRAL</h2>
        <small style="color: #64748b; letter-spacing: 1px;">INGENIERÍA & CONTROL TICs</small>
    </div>

    <div th:if="${param.error}" style="background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem;">
        <i class="fas fa-exclamation-circle"></i> Correo o contraseña incorrectos.
    </div>

    <form th:action="@{/login}" method="post">
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem; font-weight: 700; color: #475569; display: block; margin-bottom: 5px;">CORREO ELECTRÓNICO</label>
            <input type="text" name="username" class="input-field" placeholder="admin@mastercontrol.com.ec" required style="margin-bottom: 0;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="font-size: 0.8rem; font-weight: 700; color: #475569; display: block; margin-bottom: 5px;">CONTRASEÑA</label>
            <input type="password" name="password" class="input-field" placeholder="••••••••" required style="margin-bottom: 0;">
        </div>

        <div style="display: flex; align-items: center; margin-bottom: 25px; cursor: pointer;">
            <input type="checkbox" name="remember-me" id="remember" style="width: 18px; height: 18px; cursor: pointer; margin-right: 10px;">
            <label for="remember" style="font-size: 0.9rem; color: #475569; user-select: none; cursor: pointer;">Mantener sesión iniciada por 30 días</label>
        </div>

        <button type="submit" class="btn">
            <i class="fas fa-sign-in-alt"></i> ACCEDER AL PANEL
        </button>
    </form>

    <p style="text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8;">
        © 2026 Master Control Engineering | Quito, Ecuador
    </p>
</div>
</body>
</html>

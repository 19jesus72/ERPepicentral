<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral - Iniciar Sesión</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-card h2 { color: #2c3e50; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #7f8c8d; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-login { background-color: #2980b9; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .btn-login:hover { background-color: #3498db; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Epicentral ERP</h2>
    <div th:if="${param.error}" class="error">Usuario o contraseña incorrectos.</div>

    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="text" name="username" required autofocus>
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-login">Acceder al Sistema</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Epicentral | Hoja de Tiempos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>

    <main class="content">
        <header class="top-bar">
            <h1>Auditoría de Tiempos y Proyectos</h1>
            <div class="user-info"><span>Módulo: <strong>Recursos Humanos</strong></span></div>
        </header>

        <div class="dashboard-grid">
            <div class="widget" style="grid-column: span 3;">

                <form th:action="@{/rrhh/timesheet}" method="get" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Filtrar por proyecto (Ej: Redes TP-Link)..." class="input-field" style="margin: 0; flex-grow: 1; max-width: 400px; border-color: var(--secondary);">
                    <button type="submit" class="btn" style="width: auto; padding: 10px 25px; background: var(--secondary);">
                        <i class="fas fa-filter"></i> FILTRAR
                    </button>
                    <a th:href="@{/rrhh/timesheet}" class="btn" style="width: auto; padding: 10px 25px; background: #64748b; text-decoration: none;">
                        <i class="fas fa-times"></i> LIMPIAR
                    </a>
                </form>

                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; background: #f8fafc;">
                        <th style="padding: 12px;">FECHA</th>
                        <th style="padding: 12px;">COLABORADOR</th>
                        <th style="padding: 12px;">PROYECTO / UBICACIÓN</th>
                        <th style="padding: 12px;">ENTRADA</th>
                        <th style="padding: 12px;">SALIDA</th>
                        <th style="padding: 12px;">ESTADO</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${registros}" style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding: 12px; font-weight: bold; color: #1e3a8a;" th:text="${r.workDate}"></td>
                        <td style="padding: 12px;">
                            <span th:text="${r.user.firstName + ' ' + r.user.firstSurname}" style="display: block; font-weight: 600;"></span>
                            <small th:text="${r.user.jobTitle}" style="color: #64748b;"></small>
                        </td>
                        <td style="padding: 12px;">
                            <strong th:text="${r.assignedProject}" style="color: #475569; display: block;"></strong>
                            <small th:text="${r.locationMode}" style="color: #94a3b8;"><i class="fas fa-map-marker-alt"></i></small>
                        </td>
                        <td style="padding: 12px; font-family: monospace; color: #16a34a;" th:text="${r.clockInTime != null ? r.clockInTime : '--:--'}"></td>
                        <td style="padding: 12px; font-family: monospace; color: #dc2626;" th:text="${r.clockOutTime != null ? r.clockOutTime : '--:--'}"></td>
                        <td style="padding: 12px;">
                            <span th:if="${r.status == 'TRABAJANDO'}" style="background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;">EN CURSO</span>
                            <span th:if="${r.status == 'EN PAUSA'}" style="background: #fef08a; color: #854d0e; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;">ALMUERZO</span>
                            <span th:if="${r.status == 'FINALIZADO'}" style="background: #f1f5f9; color: #475569; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;">COMPLETADO</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(registros)}">
                        <td colspan="6" style="padding: 20px; text-align: center; color: #94a3b8;">
                            No hay registros de tiempo en el sistema.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>

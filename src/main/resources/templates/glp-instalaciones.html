<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Instalaciones GLP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>

    <main class="content">
        <header class="top-bar">
            <h1>Infraestructura GLP y Control de Mantenimientos</h1>
            <div class="user-info"><span>Módulo: <strong>Operaciones de Campo</strong></span></div>
        </header>

        <div th:if="${param.exito}" style="background: #dcfce7; color: #166534; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold;">
            <i class="fas fa-check-circle"></i> Infraestructura de gas registrada correctamente.
        </div>

        <div class="dashboard-grid">

            <div class="widget" style="grid-column: span 1; height: fit-content; border-top: 5px solid #f97316;">
                <h3 style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-fire-flame-simple"></i> Registrar Sistema GLP
                </h3>

                <form th:action="@{/operaciones/glp/instalaciones/guardar}" th:object="${nuevaInstalacion}" method="post">

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Cliente Asignado</label>
                        <select name="clientId" class="input-field" required>
                            <option value="" disabled selected>-- Buscar Cliente --</option>
                            <option th:each="cli : ${clientes}" th:value="${cli.id}" th:text="${cli.businessName}"></option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Proyecto / Sección</label>
                        <input type="text" th:field="*{projectName}" class="input-field" placeholder="Ej: Tren de Regulación Principal" required>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Ubicación Física</label>
                        <input type="text" th:field="*{location}" class="input-field" placeholder="Ej: Galpón 2, Terraza..." required>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Capacidad (Gal)</label>
                            <input type="number" step="0.1" th:field="*{tankCapacityGallons}" class="input-field" required>
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #475569;">Tipo Regulación</label>
                            <input type="text" th:field="*{regulatorType}" class="input-field" placeholder="Ej: Alta Presión" required>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: bold; color: #dc2626; cursor: pointer;">
                            <input type="checkbox" th:field="*{hasFireSystem}" style="width: 18px; height: 18px; accent-color: #dc2626;">
                            Incluye Sistema Contra Incendios
                        </label>
                    </div>

                    <div style="background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                        <label style="font-size: 0.8rem; font-weight: bold; color: #1e3a8a; display: block; margin-bottom: 5px;">Último Mantenimiento</label>
                        <input type="date" th:field="*{lastMaintenanceDate}" class="input-field" required>

                        <label style="font-size: 0.8rem; font-weight: bold; color: #f59e0b; display: block; margin-bottom: 5px; margin-top: 10px;">Próximo Mantenimiento (Límite)</label>
                        <input type="date" th:field="*{nextMaintenanceDate}" class="input-field" required style="margin-bottom: 0;">
                    </div>

                    <button type="submit" class="btn" style="width: 100%; background: #f97316; color: white;">
                        <i class="fas fa-save"></i> GUARDAR INSTALACIÓN
                    </button>
                </form>
            </div>

            <div class="widget" style="grid-column: span 2;">
                <h3 style="color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <i class="fas fa-tools"></i> Cronograma de Mantenimiento Preventivo
                </h3>

                <table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem;">
                    <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; background: #f8fafc;">
                        <th style="padding: 10px;">CLIENTE E INFRAESTRUCTURA</th>
                        <th style="padding: 10px;">CAPACIDAD / EQUIPO</th>
                        <th style="padding: 10px;">PRÓXIMO MTTO.</th>
                        <th style="padding: 10px; text-align: center;">ESTADO</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="inst : ${instalaciones}" style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding: 10px;">
                            <strong style="color: #1e3a8a; display: block;" th:text="${inst.client.businessName}"></strong>
                            <span style="font-weight: bold; color: #475569;" th:text="${inst.projectName}"></span><br>
                            <small style="color: #94a3b8;" th:text="${'Ubicación: ' + inst.location}"></small>
                        </td>
                        <td style="padding: 10px;">
                            <span style="display: block; color: #475569;" th:text="${inst.tankCapacityGallons + ' Galones'}"></span>
                            <small style="color: #64748b;" th:text="${inst.regulatorType}"></small>
                            <div th:if="${inst.hasFireSystem}" style="margin-top: 4px; font-size: 0.7rem; color: #dc2626; font-weight: bold;">
                                <i class="fas fa-fire-extinguisher"></i> C. INCENDIOS
                            </div>
                        </td>
                        <td style="padding: 10px; font-weight: bold;">
                            <span th:if="${inst.status == 'OPERATIVO'}" style="color: #16a34a;" th:text="${inst.nextMaintenanceDate}"></span>
                            <span th:if="${inst.status == 'REQUIERE_INSPECCION'}" style="color: #dc2626;" th:text="${inst.nextMaintenanceDate}"></span>
                        </td>
                        <td style="padding: 10px; text-align: center;">
                            <div th:if="${inst.status == 'OPERATIVO'}" style="background: #dcfce7; color: #166534; padding: 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;">
                                <i class="fas fa-check-circle"></i> OPERATIVO
                            </div>
                            <div th:if="${inst.status == 'REQUIERE_INSPECCION'}" style="background: #fee2e2; color: #b91c1c; padding: 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; animation: pulse 2s infinite;">
                                <i class="fas fa-exclamation-triangle"></i> INSPECCIÓN URGENTE
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>

<style>
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
    }
</style>
</body>
</html>

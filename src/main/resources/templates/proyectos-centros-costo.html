<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Epicentral | Centros de Costo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="main-wrapper">
    <nav class="sidebar" th:replace="~{dashboard :: sidebar}"></nav>
    <main class="content">
        <header class="top-bar">
            <h1>Gestión de Centros de Costo</h1>
        </header>
        <div class="dashboard-grid">
            <div class="widget" style="grid-column: span 1;">
                <h3><i class="fas fa-plus-circle"></i> Nuevo Centro</h3>
                <form th:action="@{/proyectos/centros-costo/guardar}" th:object="${nuevoCentro}" method="post">
                    <input type="text" th:field="*{code}" class="input-field" placeholder="Código (ej: CC-GLP-001)" required>
                    <input type="text" th:field="*{name}" class="input-field" placeholder="Nombre del Proyecto..." required>
                    <input type="number" step="0.01" th:field="*{assignedBudget}" class="input-field" placeholder="Presupuesto Estimado ($)" required>
                    <button type="submit" class="btn" style="width: 100%; background: var(--primary);">CREAR CENTRO</button>
                </form>
            </div>
            <div class="widget" style="grid-column: span 2;">
                <h3><i class="fas fa-list"></i> Centros Activos</h3>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead><tr style="text-align: left; border-bottom: 2px solid #eee;"><th style="padding:10px;">CÓDIGO</th><th style="padding:10px;">PROYECTO</th><th style="padding:10px;">PRESUPUESTO</th></tr></thead>
                    <tbody>
                    <tr th:each="c : ${centros}" style="border-bottom: 1px solid #f9f9f9;">
                        <td style="padding:10px; font-weight: bold;" th:text="${c.code}"></td>
                        <td style="padding:10px;" th:text="${c.name}"></td>
                        <td style="padding:10px; color: #16a34a; font-weight: bold;">$ <span th:text="${c.assignedBudget}"></span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
